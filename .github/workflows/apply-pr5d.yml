name: Apply PR5-D

on:
  push:
    branches:
      - agent/pr5d-decision-decontamination

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/pr5d-decision-decontamination

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Apply PR5-D patch
        run: python scripts/apply_pr5d_patch.py

      - name: Remove temporary patch machinery
        run: |
          rm scripts/apply_pr5d_patch.py
          rm .github/workflows/apply-pr5d.yml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run full test suite
        run: python -m pytest tests -q --tb=short

      - name: Commit and push implementation
        run: |
          git config user.name "openai-agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          git commit -m "Implement PR5-D decision decontamination"
          git push origin HEAD:agent/pr5d-decision-decontamination
