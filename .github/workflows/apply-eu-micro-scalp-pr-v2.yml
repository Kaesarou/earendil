name: Apply EU micro-scalp cleanup v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enable-eu-micro-scalp-default
          fetch-depth: 0

      - name: Enable EU fallback as normal strategy behavior
        run: |
          python - <<'PY'
          from pathlib import Path

          settings_path = Path('app/config/settings.py')
          settings_lines = settings_path.read_text(encoding='utf-8').splitlines(keepends=True)
          field_start = next(i for i, line in enumerate(settings_lines) if 'eu_micro_scalp_fallback_enabled: bool = Field(' in line)
          field_end = next(i for i in range(field_start, len(settings_lines)) if settings_lines[i] == '    )\n')
          if field_end + 1 < len(settings_lines) and settings_lines[field_end + 1].strip() == '':
              field_end += 1
          del settings_lines[field_start:field_end + 1]
          settings_path.write_text(''.join(settings_lines), encoding='utf-8')

          env_path = Path('.env.example')
          env_lines = env_path.read_text(encoding='utf-8').splitlines(keepends=True)
          env_index = next(i for i, line in enumerate(env_lines) if line.startswith('EU_MICRO_SCALP_FALLBACK_ENABLED='))
          env_start = env_index
          while env_start > 0 and env_lines[env_start - 1].startswith('#'):
              env_start -= 1
          env_end = env_index + 1
          if env_end < len(env_lines) and env_lines[env_end].strip() == '':
              env_end += 1
          del env_lines[env_start:env_end]
          env_path.write_text(''.join(env_lines), encoding='utf-8')

          feasibility_path = Path('app/execution/scoring/tp_feasibility.py')
          feasibility = feasibility_path.read_text(encoding='utf-8')
          evaluator_start = feasibility.index('class CandidateTpFeasibilityEvaluator:')
          probability_method_start = feasibility.index('    def _with_tp_probability', evaluator_start)
          evaluator_head = '''class CandidateTpFeasibilityEvaluator:\n    def __init__(self, analyzer: TpFeasibilityAnalyzer | None = None):\n        self.analyzer = analyzer or TpFeasibilityAnalyzer()\n\n    def evaluate(self, *, evaluated_candidate: EvaluatedTradeCandidate, risk_profile: RiskProfile) -> EvaluatedTradeCandidate:\n        analysis = self.analyzer.analyze(evaluated_candidate=evaluated_candidate, risk_profile=risk_profile)\n        candidate = evaluated_candidate.candidate\n        updated_candidate = replace(candidate, score=analysis.adjusted_score, rank_reason=_append_rank_reason(candidate.rank_reason, analysis), tp_feasibility_metadata=analysis_to_metadata(analysis), tp_feasibility_penalty=analysis.tp_feasibility_penalty, tp_feasibility_score_cap=analysis.score_cap, tp_feasibility_hard_rejection_reason=analysis.tp_feasibility_hard_rejection_reason)\n        normal_evaluated_candidate = replace(evaluated_candidate, candidate=updated_candidate, tp_feasibility=analysis)\n\n        from app.execution.eu_micro_scalp_fallback import EuMicroScalpFallbackAdjuster\n\n        fallback_evaluated_candidate = EuMicroScalpFallbackAdjuster(self.analyzer).adjust(\n            raw_evaluated_candidate=evaluated_candidate,\n            normal_evaluated_candidate=normal_evaluated_candidate,\n            risk_profile=risk_profile,\n            normal_analysis=analysis,\n        )\n        return self._with_tp_probability(fallback_evaluated_candidate)\n\n'''
          feasibility = feasibility[:evaluator_start] + evaluator_head + feasibility[probability_method_start:]
          feasibility_path.write_text(feasibility, encoding='utf-8')

          tests_path = Path('tests/execution/test_eu_micro_scalp_fallback.py')
          tests = tests_path.read_text(encoding='utf-8').replace(
              'CandidateTpFeasibilityEvaluator(eu_micro_scalp_fallback_enabled=True)',
              'CandidateTpFeasibilityEvaluator()',
          )
          disabled_start = tests.index('\ndef test_eu_micro_scalp_fallback_is_disabled_by_default_when_flag_is_false():')
          next_test = tests.index('\ndef test_eu_micro_scalp_fallback_ignores_non_eu_candidates():', disabled_start)
          tests = tests[:disabled_start] + '\n' + tests[next_test:]
          tests_path.write_text(tests, encoding='utf-8')

          for temporary_path in (
              Path('.github/workflows/apply-eu-micro-scalp-default.yml'),
              Path('.github/workflows/apply-eu-micro-scalp-pr.yml'),
              Path('.github/workflows/apply-eu-micro-scalp-pr-v2.yml'),
              Path('.github/eu-micro-scalp-trigger'),
          ):
              temporary_path.unlink(missing_ok=True)

          remaining = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              if 'EU_MICRO_SCALP_FALLBACK_ENABLED' in text or 'eu_micro_scalp_fallback_enabled' in text:
                  remaining.append(str(path))
          assert not remaining, remaining
          PY

      - name: Validate syntax
        run: python -m compileall -q app tests

      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "enable EU micro-scalp fallback by default"
          git push origin HEAD:agent/enable-eu-micro-scalp-default
