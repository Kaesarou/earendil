name: Apply EU micro-scalp default behavior

on:
  push:
    branches:
      - agent/enable-eu-micro-scalp-default

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/enable-eu-micro-scalp-default
          fetch-depth: 0

      - name: Remove obsolete flag and enable EU fallback by default
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          settings_path = Path('app/config/settings.py')
          settings = settings_path.read_text(encoding='utf-8')
          settings_block = """    eu_micro_scalp_fallback_enabled: bool = Field(
              default=False,
              alias='EU_MICRO_SCALP_FALLBACK_ENABLED',
          )

          """
          assert settings_block in settings
          settings_path.write_text(settings.replace(settings_block, ''), encoding='utf-8')

          env_path = Path('.env.example')
          env = env_path.read_text(encoding='utf-8')
          env_block = """# Active un fallback EU très contrôlé: TP/SL 0.6% brut pour les signaux EQUITY_EU
          # forts mais pénalisés par le TP fixe normal de 1.0%.
          EU_MICRO_SCALP_FALLBACK_ENABLED=false

          """
          assert env_block in env
          env_path.write_text(env.replace(env_block, ''), encoding='utf-8')

          feasibility_path = Path('app/execution/scoring/tp_feasibility.py')
          feasibility = feasibility_path.read_text(encoding='utf-8')
          old_evaluator = """class CandidateTpFeasibilityEvaluator:
              def __init__(
                  self,
                  analyzer: TpFeasibilityAnalyzer | None = None,
                  eu_micro_scalp_fallback_enabled: bool | None = None,
              ):
                  self.analyzer = analyzer or TpFeasibilityAnalyzer()
                  self.eu_micro_scalp_fallback_enabled = eu_micro_scalp_fallback_enabled

              def evaluate(self, *, evaluated_candidate: EvaluatedTradeCandidate, risk_profile: RiskProfile) -> EvaluatedTradeCandidate:
                  analysis = self.analyzer.analyze(evaluated_candidate=evaluated_candidate, risk_profile=risk_profile)
                  candidate = evaluated_candidate.candidate
                  updated_candidate = replace(candidate, score=analysis.adjusted_score, rank_reason=_append_rank_reason(candidate.rank_reason, analysis), tp_feasibility_metadata=analysis_to_metadata(analysis), tp_feasibility_penalty=analysis.tp_feasibility_penalty, tp_feasibility_score_cap=analysis.score_cap, tp_feasibility_hard_rejection_reason=analysis.tp_feasibility_hard_rejection_reason)
                  normal_evaluated_candidate = replace(evaluated_candidate, candidate=updated_candidate, tp_feasibility=analysis)
                  if not self._eu_micro_scalp_fallback_enabled():
                      return self._with_tp_probability(normal_evaluated_candidate)

                  from app.execution.eu_micro_scalp_fallback import EuMicroScalpFallbackAdjuster

                  fallback_evaluated_candidate = EuMicroScalpFallbackAdjuster(self.analyzer).adjust(
                      raw_evaluated_candidate=evaluated_candidate,
                      normal_evaluated_candidate=normal_evaluated_candidate,
                      risk_profile=risk_profile,
                      normal_analysis=analysis,
                  )
                  return self._with_tp_probability(fallback_evaluated_candidate)

              def _eu_micro_scalp_fallback_enabled(self) -> bool:
                  if self.eu_micro_scalp_fallback_enabled is not None:
                      return self.eu_micro_scalp_fallback_enabled
                  from app.config.settings import get_settings

                  return get_settings().eu_micro_scalp_fallback_enabled

          """
          new_evaluator = """class CandidateTpFeasibilityEvaluator:
              def __init__(self, analyzer: TpFeasibilityAnalyzer | None = None):
                  self.analyzer = analyzer or TpFeasibilityAnalyzer()

              def evaluate(self, *, evaluated_candidate: EvaluatedTradeCandidate, risk_profile: RiskProfile) -> EvaluatedTradeCandidate:
                  analysis = self.analyzer.analyze(evaluated_candidate=evaluated_candidate, risk_profile=risk_profile)
                  candidate = evaluated_candidate.candidate
                  updated_candidate = replace(candidate, score=analysis.adjusted_score, rank_reason=_append_rank_reason(candidate.rank_reason, analysis), tp_feasibility_metadata=analysis_to_metadata(analysis), tp_feasibility_penalty=analysis.tp_feasibility_penalty, tp_feasibility_score_cap=analysis.score_cap, tp_feasibility_hard_rejection_reason=analysis.tp_feasibility_hard_rejection_reason)
                  normal_evaluated_candidate = replace(evaluated_candidate, candidate=updated_candidate, tp_feasibility=analysis)

                  from app.execution.eu_micro_scalp_fallback import EuMicroScalpFallbackAdjuster

                  fallback_evaluated_candidate = EuMicroScalpFallbackAdjuster(self.analyzer).adjust(
                      raw_evaluated_candidate=evaluated_candidate,
                      normal_evaluated_candidate=normal_evaluated_candidate,
                      risk_profile=risk_profile,
                      normal_analysis=analysis,
                  )
                  return self._with_tp_probability(fallback_evaluated_candidate)

          """
          assert old_evaluator in feasibility
          feasibility_path.write_text(feasibility.replace(old_evaluator, new_evaluator), encoding='utf-8')

          tests_path = Path('tests/execution/test_eu_micro_scalp_fallback.py')
          tests = tests_path.read_text(encoding='utf-8')
          tests = tests.replace(
              'CandidateTpFeasibilityEvaluator(eu_micro_scalp_fallback_enabled=True)',
              'CandidateTpFeasibilityEvaluator()',
          )
          disabled_test = re.compile(
              r"\ndef test_eu_micro_scalp_fallback_is_disabled_by_default_when_flag_is_false\(\):\n"
              r"(?:    .*\n|\n)*?"
              r"    assert result\.candidate\.score == 110\.0\n\n",
          )
          tests, removed = disabled_test.subn('\n', tests, count=1)
          assert removed == 1
          tests_path.write_text(tests, encoding='utf-8')

          Path('.github/workflows/apply-eu-micro-scalp-default.yml').unlink()

          tracked_text = '\n'.join(
              path.read_text(encoding='utf-8')
              for path in Path('.').rglob('*')
              if path.is_file() and '.git' not in path.parts
          )
          assert 'EU_MICRO_SCALP_FALLBACK_ENABLED' not in tracked_text
          assert 'eu_micro_scalp_fallback_enabled' not in tracked_text
          PY

      - name: Validate syntax
        run: python -m compileall -q app tests

      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .env.example app/config/settings.py app/execution/scoring/tp_feasibility.py tests/execution/test_eu_micro_scalp_fallback.py .github/workflows/apply-eu-micro-scalp-default.yml
          git commit -m "enable EU micro-scalp fallback by default"
          git push origin HEAD:agent/enable-eu-micro-scalp-default
