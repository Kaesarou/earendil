name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: python -m ruff check app tests > ruff.log 2>&1

      - name: Upload Ruff diagnostics
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: ruff.log

      - name: Run tests
        id: tests
        continue-on-error: true
        run: python -m pytest tests -q --tb=short > pytest.log 2>&1

      - name: Upload pytest diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log

      - name: Report quality results
        if: always()
        run: |
          cat ruff.log
          cat pytest.log
          test "${{ steps.ruff.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
