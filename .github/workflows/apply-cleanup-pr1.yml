name: Apply cleanup PR1

on:
  push:
    branches:
      - refactor/cleanup-historical
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message || '', '[cleanup-applied]') && !contains(github.event.head_commit.message || '', '[cleanup-diagnostic]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: refactor/cleanup-historical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Apply structural cleanup
        id: cleanup
        continue-on-error: true
        run: python scripts/apply_cleanup_pr1.py > cleanup-pr1.log 2>&1

      - name: Show cleanup output
        if: always()
        run: cat cleanup-pr1.log

      - name: Persist cleanup diagnostics
        if: steps.cleanup.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cleanup-pr1.log
          git commit -m "Record cleanup failure [cleanup-diagnostic]"
          git push origin HEAD:refactor/cleanup-historical
          exit 1

      - name: Compile application
        if: steps.cleanup.outcome == 'success'
        run: python -m compileall -q app

      - name: Run tests
        if: steps.cleanup.outcome == 'success'
        run: python -m pytest tests -q

      - name: Remove one-shot migration files
        if: steps.cleanup.outcome == 'success'
        run: |
          rm scripts/apply_cleanup_pr1.py
          rm .github/workflows/apply-cleanup-pr1.yml
          rm cleanup-pr1.log

      - name: Commit cleanup
        if: steps.cleanup.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove legacy strategy compatibility [cleanup-applied]"
          git push origin HEAD:refactor/cleanup-historical
