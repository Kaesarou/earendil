name: Apply cleanup PR1

on:
  push:
    branches:
      - refactor/cleanup-historical

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message, '[cleanup-applied]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: refactor/cleanup-historical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Apply structural cleanup
        run: python scripts/apply_cleanup_pr1.py

      - name: Compile application
        run: python -m compileall -q app

      - name: Run tests
        run: python -m pytest tests -q

      - name: Remove one-shot migration files
        run: |
          rm scripts/apply_cleanup_pr1.py
          rm .github/workflows/apply-cleanup-pr1.yml

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove legacy strategy compatibility [cleanup-applied]"
          git push origin HEAD:refactor/cleanup-historical
