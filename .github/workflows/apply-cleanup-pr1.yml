name: Apply cleanup PR1

on:
  push:
    branches:
      - refactor/cleanup-historical
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message || '', '[cleanup-applied]') && !contains(github.event.head_commit.message || '', '[cleanup-diagnostic]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: refactor/cleanup-historical
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Remove remaining profile factory usage
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest_test = Path('tests/journal/test_run_manifest.py')
          content = manifest_test.read_text(encoding='utf-8')
          content = content.replace(
              'from app.strategies.strategy import strategy_profile_from_name\n',
              'from app.strategies.balanced_strategy_config import BalancedStrategyConfig\n',
          )
          content = content.replace(
              "    profile = strategy_profile_from_name('balanced')\n",
              '    profile = BalancedStrategyConfig()\n',
          )
          manifest_test.write_text(content, encoding='utf-8')

          candidate_flow = Path('app/runtime/candidate_flow.py')
          content = candidate_flow.read_text(encoding='utf-8')
          content = content.replace(
              'from app.strategies.strategy import StrategyProfileConfig\n',
              'from app.strategies.models import StrategyProfileConfig\n',
          )
          candidate_flow.write_text(content, encoding='utf-8')
          PY

      - name: Apply structural cleanup
        id: cleanup
        continue-on-error: true
        run: python scripts/apply_cleanup_pr1.py > cleanup-pr1.log 2>&1

      - name: Show cleanup output
        if: always()
        run: cat cleanup-pr1.log

      - name: Persist cleanup diagnostics
        if: steps.cleanup.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cleanup-pr1.log
          git commit -m "Record cleanup failure [cleanup-diagnostic]"
          git push origin HEAD:refactor/cleanup-historical
          exit 1

      - name: Compile application
        if: steps.cleanup.outcome == 'success'
        run: python -m compileall -q app

      - name: Run tests
        id: tests
        if: steps.cleanup.outcome == 'success'
        continue-on-error: true
        run: python -m pytest tests -q > pytest-pr1.log 2>&1

      - name: Show test output
        if: steps.cleanup.outcome == 'success'
        run: cat pytest-pr1.log

      - name: Persist test diagnostics
        if: steps.cleanup.outcome == 'success' && steps.tests.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pytest-pr1.log
          git commit -m "Record cleanup test failure [cleanup-diagnostic]"
          git push origin HEAD:refactor/cleanup-historical
          exit 1

      - name: Prepare cleanup commit
        if: steps.cleanup.outcome == 'success' && steps.tests.outcome == 'success'
        run: |
          rm scripts/apply_cleanup_pr1.py
          rm -f cleanup-pr1.log pytest-pr1.log
          git checkout -- .github/workflows/tests.yml

      - name: Commit cleanup
        if: steps.cleanup.outcome == 'success' && steps.tests.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove legacy strategy compatibility [cleanup-applied]"
          git push origin HEAD:refactor/cleanup-historical
